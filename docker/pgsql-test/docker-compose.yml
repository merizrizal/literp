services:
  database_test:
    build:
      context: ${ROOT_DIR}/docker/pgsql
      dockerfile: Dockerfile
    platform: linux/amd64
    image: literp_pgsql_test
    container_name: literp_pgsql_test
    restart: always
    networks:
      - project_network
    ports:
      - ${TEST_DB_PORT:-55432}:5432
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${TEST_DB_NAME:-literp_test}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${TEST_DB_NAME:-literp_test}"]
      interval: 5s
      timeout: 5s
      retries: 20
  migration_test:
    image: python:3.13-slim
    container_name: literp_migration_test
    depends_on:
      database_test:
        condition: service_healthy
    networks:
      - project_network
    volumes:
      - ${ROOT_DIR}:/workspace
    working_dir: /workspace/python/database/migration
    environment:
      ROOT_DIR: /workspace
      DB_URL: postgresql://${DB_USER}:${DB_PASSWORD}@database_test:5432/${TEST_DB_NAME:-literp_test}
    command: >
      /bin/sh -lc "
      pip install --no-cache-dir -r /workspace/python/requirements.txt
      && alembic -c /workspace/python/database/migration/alembic.ini upgrade head;
      "
    restart: "no"
networks:
  project_network:
    name: ${DOCKER_NETWORK}
    external: true
